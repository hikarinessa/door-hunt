<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The DoOR — A Reincarnation in Nine Stations</title>
<!--
  ============================================================================
  DoOR WEB ADVENTURE  —  standalone walkthrough of the Kiez Burn treasure hunt
  ============================================================================
  A step-by-step, in-lore retelling for people who didn't play the hunt but are
  curious. Each station: narration -> the artifact (a PDF you can FLIP with the
  arrow, one side per page) -> type the next location (or choose) -> it only
  advances when you're right -> Next.

  HOW TO EDIT  — everything lives in the STATIONS array in the <script> below.
  Each station is one object:

    {
      n: 1,                                      // station number (repeat it + add part:2 for a two-artifact station)
      title: "The Welcome Leaflet",
      intro: [ "paragraph", "paragraph" ],     // narration before the artifact
      clerk: "optional blue-ink margin note from the rogue Records clerk",
      pdf: "th_01.pdf",                          // the artifact; each page = one side
      artifactNote: "optional caption under the flipbook",
      puzzle: {
        type: "text",                            // "text"  or  "choice"
        q: "what the player must do",
        hint: "optional clue string shown under the input",
        clue: "optional hint hidden behind a 'Clue' button",
        answer: ["HALLWAY OF MIRRORS"],          // text: accepted answers (case/space-insensitive)
        placeholder: "type the next location",
        // for type:"choice" instead use:  options:[...], correct: <0-based index>
        reveal: { answer: "HALLWAY OF MIRRORS", body:[ "explanation", "explanation" ] }
      },
      outro: "optional closing line"
    }

  PDFs load by URL, so open this via a local web server or a host (GitHub Pages /
  Netlify). Opening straight off the disk (file://) can block Chrome from reading
  the PDFs. Quick local server:  python3 -m http.server  then open the shown URL.
  (Want ONE truly portable file with the PDFs baked in? Ask and I'll base64-embed.)
  ============================================================================
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Bitter:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Serif+Display:ital@0;1&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Special+Elite&display=swap');

  :root{
    --cream:#fdf5e3; --paper:#fffdf6; --gold:#e7a93f; --gold-d:#c9892f;
    --coral:#d65f38; --coral-d:#b5471f; --leaf:#5f9d6b; --leaf-d:#4f8a5c;
    --ink:#3e2a1c; --ink2:#6b5039; --shadow:rgba(62,42,28,.18); --blue:#4a6fb0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Bitter',Georgia,serif; color:var(--ink);
    background:radial-gradient(1200px 600px at 50% -10%, #fbeccb 0%, rgba(251,236,203,0) 60%), #f2e6cb;
    min-height:100vh; line-height:1.55;
  }
  h1,h2,h3,.fred{font-family:'Fredoka',system-ui,sans-serif;}
  .mono{font-family:'Special Elite',monospace;}
  .wrap{max-width:760px; margin:0 auto; padding:28px 20px 80px;}

  .topbar{display:flex; align-items:center; gap:12px; padding:10px 0 16px; border-bottom:1px solid rgba(201,137,47,.4); cursor:pointer;}
  .topbar img{width:34px; height:34px; filter:drop-shadow(0 1px 2px rgba(0,0,0,.25));}
  .topbar .dept{font:600 12px/1.2 'Cormorant Garamond',serif; letter-spacing:2.5px; text-transform:uppercase; color:var(--gold-d);}
  .topbar .motto{margin-left:auto; font:italic 500 13px/1 'Cormorant Garamond',serif; color:var(--ink2);}

  .progress-row{display:flex; align-items:center; gap:10px; margin:18px 0 8px; font:600 11px/1 'Fredoka'; letter-spacing:.5px; color:var(--ink2); text-transform:uppercase;}
  .progress-track{flex:1; height:7px; background:rgba(201,137,47,.22); border-radius:99px; overflow:hidden;}
  .progress-fill{height:100%; width:0; background:linear-gradient(90deg,var(--gold),var(--coral)); border-radius:99px; transition:width .4s ease;}

  .card{background:var(--paper); border:1px solid rgba(201,137,47,.5); border-radius:14px; box-shadow:0 8px 26px var(--shadow); padding:26px 28px; margin:18px 0;}
  .kicker{font:600 11px/1 'Cormorant Garamond',serif; letter-spacing:3px; text-transform:uppercase; color:var(--gold-d); margin-bottom:8px;}
  .station-title{font:400 30px/1.1 'DM Serif Display',serif; color:var(--ink); margin:0 0 6px;}
  .station-title .n{color:var(--coral-d);}

  .narration{font:400 16px/1.62 'Bitter',serif; color:var(--ink);}
  .narration p{margin:0 0 12px;} .narration p:last-child{margin-bottom:0;}

  .clerk{margin:14px 0 2px; padding:10px 14px; border-left:3px solid var(--blue); background:rgba(74,111,176,.06);
    font:italic 400 14.5px/1.5 'Bitter',serif; color:#37589a; border-radius:0 8px 8px 0;}
  .clerk::before{content:"— found tucked in the margin, blue ink, unsigned"; display:block; font:600 9.5px/1.4 'Fredoka'; letter-spacing:.6px; text-transform:uppercase; color:#7d94c4; margin-bottom:4px;}

  /* ---------- flipbook ---------- */
  .artifact-wrap{margin:20px 0 6px;}
  .flipbook{position:relative; display:flex; flex-direction:column; align-items:center; gap:12px;}
  .flipbook + .flipbook{margin-top:18px;}
  .flip-stage-row{display:flex; align-items:center; gap:12px;}
  .flip-stage{position:relative; background:#e7dcc4; border:1px solid rgba(201,137,47,.5); border-radius:12px; padding:16px; box-shadow:inset 0 2px 10px rgba(62,42,28,.12);}
  .flip-canvas{display:block; background:#fff; box-shadow:0 8px 22px rgba(0,0,0,.3); border-radius:2px; max-width:100%; height:auto; cursor:zoom-in;}
  .lightbox{position:fixed; inset:0; z-index:99; background:rgba(30,20,12,.88); display:flex; align-items:center; justify-content:center; padding:24px; cursor:zoom-out;}
  .lightbox canvas{max-width:100%; max-height:100%; background:#fff; border-radius:3px; box-shadow:0 12px 40px rgba(0,0,0,.55);}
  .flip-loading{font:italic 400 13px/1.5 'Bitter'; color:var(--ink2); padding:60px 30px; text-align:center;}
  .flip-arrow{flex:0 0 auto; width:46px; height:46px; border-radius:50%;
    background:var(--coral); color:#fff; border:none; cursor:pointer; box-shadow:0 4px 12px rgba(214,95,56,.45);
    font-size:22px; line-height:1; display:flex; align-items:center; justify-content:center; transition:all .15s ease;}
  .flip-arrow:hover{background:var(--coral-d); transform:scale(1.06);}
  .flip-meta{display:flex; align-items:center; gap:10px; font:600 11px/1 'Fredoka'; letter-spacing:.5px; text-transform:uppercase; color:var(--ink2);}
  .flip-dots{display:flex; gap:6px;}
  .flip-dots .dot{width:8px; height:8px; border-radius:50%; background:rgba(201,137,47,.4);}
  .flip-dots .dot.on{background:var(--coral);}
  .artifact-note{font:italic 400 12.5px/1.45 'Bitter'; color:var(--ink2); margin:10px auto 0; max-width:460px; text-align:center;}
  .clue-text{font:italic 400 13.5px/1.5 'Bitter',serif; color:var(--ink2); margin:10px 0 0;}

  /* ---------- puzzle ---------- */
  .puzzle{margin-top:22px; border-top:1px dashed rgba(201,137,47,.6); padding-top:18px;}
  .puzzle .q{font:600 15px/1.5 'Fredoka'; color:var(--ink); margin:0 0 12px;}

  .answer-input{width:100%; font:400 18px/1.3 'Special Elite',monospace; color:var(--ink); background:#fffef9;
    border:1.5px solid var(--gold-d); border-radius:9px; padding:13px 14px; letter-spacing:1px; text-align:center; text-transform:uppercase;}
  .answer-input:focus{outline:none; border-color:var(--coral); box-shadow:0 0 0 3px rgba(214,95,56,.15);}
  .answer-input.shake{animation:shake .35s;}
  @keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-7px);}40%,80%{transform:translateX(7px);}}

  .choices{display:flex; flex-direction:column; gap:9px;}
  .choice{display:flex; align-items:flex-start; gap:11px; padding:12px 14px; background:#fffef9; border:1.5px solid rgba(201,137,47,.5);
    border-radius:9px; cursor:pointer; font:400 15px/1.45 'Bitter',serif; color:var(--ink); transition:all .15s ease;}
  .choice:hover{border-color:var(--coral); background:#fff8ee;}
  .choice .mark{flex:0 0 auto; width:22px; height:22px; border-radius:50%; border:2px solid var(--gold-d); display:flex; align-items:center; justify-content:center; font:700 12px/1 'Fredoka'; color:var(--gold-d);}
  .choice.selected{border-color:var(--coral); background:#fff3e6;}
  .choice.correct{border-color:var(--leaf-d); background:rgba(95,157,107,.14);}
  .choice.correct .mark{background:var(--leaf-d); border-color:var(--leaf-d); color:#fff;}
  .choice.wrong{border-color:var(--coral-d); background:rgba(181,71,31,.1);}
  .choice.wrong .mark{background:var(--coral-d); border-color:var(--coral-d); color:#fff;}
  .choice.locked{pointer-events:none; opacity:.85;}

  .btn-row{display:flex; flex-wrap:wrap; gap:10px; margin-top:16px; align-items:center;}
  .btn{font:600 14px/1 system-ui,-apple-system,sans-serif; padding:12px 20px; border-radius:10px; border:1.5px solid transparent; cursor:pointer; transition:all .15s ease;}
  .btn-primary{background:var(--coral); color:#fff; box-shadow:0 4px 12px rgba(214,95,56,.35);}
  .btn-primary:hover{background:var(--coral-d);}
  .btn-ghost{background:transparent; color:var(--ink2); border-color:rgba(201,137,47,.6);}
  .btn-ghost:hover{background:rgba(201,137,47,.12); color:var(--ink);}
  .btn:disabled{opacity:.4; cursor:not-allowed; box-shadow:none;}
  .btn.pulse{animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 4px 12px rgba(214,95,56,.35);}50%{box-shadow:0 4px 20px rgba(214,95,56,.8);}}

  .feedback{margin-top:12px; font:600 14px/1.5 'Fredoka'; min-height:1px;}
  .feedback.ok{color:var(--leaf-d);} .feedback.no{color:var(--coral-d);}

  .reveal{margin-top:16px; padding:16px 18px; background:linear-gradient(180deg,#fbf1d8,#fdf7e9); border:1px solid var(--gold); border-radius:11px; display:none;}
  .reveal.show{display:block; animation:fade .4s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}
  .reveal .rk{font:700 10px/1 'Fredoka'; letter-spacing:1.4px; text-transform:uppercase; color:var(--gold-d); margin-bottom:8px;}
  .reveal .ans{font:400 20px/1.2 'Special Elite',monospace; color:var(--coral-d); letter-spacing:1px; margin-bottom:8px;}
  .reveal p{font:400 14.5px/1.55 'Bitter',serif; color:var(--ink); margin:0 0 8px;} .reveal p:last-child{margin:0;}

  .nav-row{display:flex; justify-content:space-between; align-items:center; margin-top:24px;}

  .landing{text-align:center; padding:40px 30px 44px;}
  .landing .stamp{width:88px; height:88px; margin:0 auto 14px; filter:drop-shadow(0 2px 4px rgba(0,0,0,.25));}
  .landing .dept{font:600 12px/1.3 'Cormorant Garamond',serif; letter-spacing:3px; text-transform:uppercase; color:var(--gold-d);}
  .landing h1{font:400 44px/1.05 'DM Serif Display',serif; color:var(--ink); margin:8px 0 6px;}
  .landing h1 .d{color:var(--coral-d);}
  .landing .sub{font:italic 500 17px/1.4 'Cormorant Garamond',serif; color:var(--ink2); max-width:520px; margin:0 auto 4px;}
  .landing .motto{font:italic 600 14px/1 'Cormorant Garamond',serif; color:var(--gold-d); letter-spacing:1px; margin:14px 0 22px;}
  .landing .blurb{font:400 15.5px/1.6 'Bitter',serif; color:var(--ink); max-width:560px; margin:0 auto 26px; text-align:left;}
  .landing .blurb p{margin:0 0 12px;}
  .landing .credits{font:italic 400 12.5px/1.6 'Bitter',serif; color:var(--ink2); margin-top:26px; opacity:.85;}

  .done{text-align:center; padding:40px 30px;}
  .done .stamp{width:72px; height:72px; margin:0 auto 12px;}
  .done h2{font:400 34px/1.1 'DM Serif Display',serif; color:var(--ink); margin:0 0 10px;}
  .done p{font:400 16px/1.6 'Bitter',serif; color:var(--ink); max-width:540px; margin:0 auto 12px;}

  .footer{text-align:center; font:italic 400 12px/1.5 'Bitter'; color:var(--ink2); margin-top:30px; opacity:.8;}
  @media (max-width:560px){ .card{padding:20px 18px;} .landing h1{font-size:34px;} .station-title{font-size:24px;} }
</style>
</head>

/* ============================================================================

/* ============================================================================
   ENGINE
   ============================================================================ */
const app = document.getElementById('app');
const progressRow = document.getElementById('progressRow');
const progressFill = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');
const TOTAL = STATIONS.length;
const NSTATIONS = Math.max(...STATIONS.map(s=>s.n));
let idx = -1;
let solvedFlag = false;
let selected = -1;
const pdfCache = {};

function norm(s){ return (s||'').toString().toUpperCase().replace(/[^A-Z0-9]/g,''); }

function setProgress(){
  if(idx < 0 || idx >= TOTAL){ progressRow.style.display='none'; return; }
  progressRow.style.display='flex';
  progressLabel.textContent = 'Station ' + STATIONS[idx].n;
  progressFill.style.width = ((idx/TOTAL)*100) + '%';
}

function renderLanding(){
  setProgress();
  app.innerHTML = `
    <div class="card landing">
      <img class="stamp" src="Door_Stamp.svg" alt="DoOR seal">
      <div class="dept">Department of Orderly Reincarnation</div>
      <h1>The <span class="d">DoOR</span></h1>
      <div class="motto">Mors non finis · death is not the end</div>
      <div class="blurb">
        <p>A treasure hunt designed for Kiez Burn 2026</p>
      </div>
      <button class="btn btn-primary" style="font-size:16px;padding:14px 30px" onclick="go(0)">Begin Processing ▸</button>
      <div class="credits">Brought to you by Indrek, Luz and Oud<br>compliments from the Romanesco Realm</div>
    </div>`;
}

function renderStation(i){
  const s = STATIONS[i];
  solvedFlag = false; selected = -1;
  const pdfs = Array.isArray(s.pdf) ? s.pdf : [s.pdf];
  const introHTML = s.intro.map(p=>`<p>${p}</p>`).join('');
  const clerkHTML = s.clerk ? `<div class="clerk">${s.clerk}</div>` : '';

  let puzzleHTML = '';
  if(s.puzzle){
    let puzzleInput = '';
    if(s.puzzle.type === 'text'){
      puzzleInput = `
        <input class="answer-input" id="ans" placeholder="${s.puzzle.placeholder||'your answer'}" autocomplete="off" spellcheck="false"
               onkeydown="if(event.key==='Enter')checkText()">
        ${s.puzzle.hint ? `<p class="artifact-note" style="margin-top:10px">Clue as shown: <span class="mono">${s.puzzle.hint}</span></p>`:''}`;
    } else {
      puzzleInput = `<div class="choices" id="choices">` + s.puzzle.options.map((o,ci)=>`
        <div class="choice" data-i="${ci}" onclick="pickChoice(${ci})"><span class="mark">${String.fromCharCode(65+ci)}</span><span>${o}</span></div>`).join('') + `</div>`;
    }
    puzzleHTML = `
      <div class="puzzle">
        ${s.puzzle.q ? `<p class="q">${s.puzzle.q}</p>`:''}
        ${puzzleInput}
        <div class="btn-row">
          <button class="btn btn-primary" id="checkBtn" onclick="${s.puzzle.type==='text'?'checkText()':'checkChoice()'}">Check answer</button>
          ${s.puzzle.clue ? `<button class="btn btn-ghost" id="clueBtn" onclick="showClue()">Clue</button>`:''}
          <button class="btn btn-ghost" onclick="revealAnswer()">Reveal answer</button>
          <span class="feedback" id="feedback"></span>
        </div>
        ${s.puzzle.clue ? `<p class="clue-text" id="clueText" style="display:none">${s.puzzle.clue}</p>`:''}
        <div class="reveal" id="reveal">
          <div class="rk">The way onward</div>
          <div class="ans">${s.puzzle.reveal.answer}</div>
          ${s.puzzle.reveal.body.map(p=>`<p>${p}</p>`).join('')}
        </div>
      </div>`;
  }

  app.innerHTML = `
    <div class="card">
      <div class="kicker">Station ${s.n} of ${NSTATIONS}${s.part?' · part '+s.part:''}</div>
      <h2 class="station-title"><span class="n">${s.n}.</span> ${s.title}</h2>
      <div class="narration">${introHTML}</div>
      ${clerkHTML}

      <div class="artifact-wrap">
        ${pdfs.map((_,k)=>`
        <div class="flipbook">
          <div class="flip-stage-row">
            <div class="flip-stage" id="flipStage${k}">
              <div class="flip-loading" id="flipLoading${k}">Retrieving document from the Archive…</div>
              <canvas class="flip-canvas" id="flipCanvas${k}" style="display:none" title="Click to enlarge" onclick="openLightbox(${k})"></canvas>
            </div>
            <button class="flip-arrow" id="flipArrow${k}" style="display:none" title="Turn it over" onclick="flipPage(${k})">↻</button>
          </div>
          <div class="flip-meta" id="flipMeta${k}" style="display:none">
            <span id="flipSideLabel${k}">Side 1 of 2</span>
            <span class="flip-dots" id="flipDots${k}"></span>
          </div>
        </div>`).join('')}
        ${s.artifactNote ? `<p class="artifact-note">${s.artifactNote}</p>`:''}
      </div>

      ${s.after ? `<div class="narration" style="margin-top:18px"><p>${s.after}</p></div>`:''}

      ${s.branch ? `<div class="puzzle"><div class="choices">` + s.branch.map((b,bi)=>`
        <div class="choice" onclick="branchGo(${bi})"><span class="mark">${String.fromCharCode(65+bi)}</span><span>${b.label}</span></div>`).join('') + `</div></div>`:''}

      ${puzzleHTML}

      ${s.outro ? `<div class="narration" id="outro" style="margin-top:16px;color:var(--ink2);font-style:italic;display:none">${s.outro}</div>`:''}

      <div class="nav-row">
        <button class="btn btn-ghost" onclick="go(${i-1})">${i===0?'◂ Beginning':'◂ Back'}</button>
        ${s.branch ? '' : `<button class="btn btn-primary ${s.puzzle?'':'pulse'}" id="nextBtn" onclick="go(${i+1})" ${s.puzzle?'disabled':''}>${i+1>=TOTAL?'Finish ▸':(s.nextLabel||'Next ▸')}</button>`}
      </div>
    </div>`;

  flips = pdfs.map(()=>null);
  pdfs.forEach((u,k)=>setupFlipbook(u,k));
}

/* ---------- flipbook (supports several artifacts per station) ---------- */
let flips = [];
async function setupFlipbook(url, k){
  const flip = { doc:null, img:null, page:1, pages:1, rendering:false };
  flips[k] = flip;
  const loading = document.getElementById('flipLoading'+k);
  try{
    if(/\.(jpe?g|png|webp|gif)$/i.test(url)){
      let img = pdfCache[url];
      if(!img){
        img = new Image();
        await new Promise((res,rej)=>{ img.onload=res; img.onerror=()=>rej(new Error('image failed')); img.src=url; });
        pdfCache[url] = img;
      }
      flip.img = img;
    } else {
      if(!window.pdfjsLib) throw new Error('pdf.js unavailable');
      let doc = pdfCache[url];
      if(!doc){ doc = await pdfjsLib.getDocument(url).promise; pdfCache[url]=doc; }
      flip.doc = doc; flip.pages = doc.numPages; flip.page = 1;
    }
    document.getElementById('flipCanvas'+k).style.display='block';
    if(flip.pages > 1){
      document.getElementById('flipArrow'+k).style.display='flex';
      document.getElementById('flipMeta'+k).style.display='flex';
      document.getElementById('flipDots'+k).innerHTML =
        Array.from({length:flip.pages},(_,d)=>`<span class="dot ${d===0?'on':''}"></span>`).join('');
    }
    await renderFlip(k);
    loading.style.display='none';
  }catch(e){
    loading.innerHTML = `Couldn't load <span class="mono">${url}</span>.<br><span style="font-size:11px">If you opened this file directly, run a local server (<span class="mono">python3 -m http.server</span>) so the browser can read the PDF.</span>`;
  }
}
async function renderFlip(k){
  const flip = flips[k];
  if(!flip || (!flip.doc && !flip.img) || flip.rendering) return;
  flip.rendering = true;
  const canvas = document.getElementById('flipCanvas'+k);
  if(!canvas){ flip.rendering=false; return; }
  const stage = document.getElementById('flipStage'+k);
  const stageW = Math.min(360, (stage && stage.clientWidth || 360) - 32);
  const maxH = 600;
  const dpr = window.devicePixelRatio || 1;
  if(flip.img){
    const w = flip.img.naturalWidth, h = flip.img.naturalHeight;
    let scale = stageW / w;
    if(h*scale > maxH) scale = maxH / h;
    canvas.width = Math.round(w*scale*dpr); canvas.height = Math.round(h*scale*dpr);
    canvas.style.width = Math.round(w*scale)+'px'; canvas.style.height = Math.round(h*scale)+'px';
    canvas.getContext('2d').drawImage(flip.img, 0, 0, canvas.width, canvas.height);
  } else {
    const page = await flip.doc.getPage(flip.page);
    const base = page.getViewport({scale:1});
    let scale = stageW / base.width;
    if(base.height*scale > maxH) scale = maxH / base.height;
    const vp = page.getViewport({scale: scale*dpr});
    canvas.width = vp.width; canvas.height = vp.height;
    canvas.style.width = (vp.width/dpr)+'px'; canvas.style.height = (vp.height/dpr)+'px';
    await page.render({canvasContext:canvas.getContext('2d'), viewport:vp}).promise;
    if(flip.pages > 1){
      const lbl = document.getElementById('flipSideLabel'+k); if(lbl) lbl.textContent = `Side ${flip.page} of ${flip.pages}`;
      document.querySelectorAll('#flipDots'+k+' .dot').forEach((d,di)=>d.classList.toggle('on', di===flip.page-1));
    }
  }
  flip.rendering = false;
}
window.flipPage = function(k){
  const flip = flips[k];
  if(!flip || !flip.doc || flip.pages<2) return;
  flip.page = flip.page % flip.pages + 1;
  renderFlip(k);
};

/* ---------- lightbox ---------- */
window.openLightbox = async function(k){
  const flip = flips[k];
  if(!flip || (!flip.doc && !flip.img)) return;
  const lb = document.getElementById('lightbox');
  lb.style.display='flex';
  const availW = window.innerWidth-48, availH = window.innerHeight-48;
  const dpr = window.devicePixelRatio || 1;
  const c = document.getElementById('lightboxCanvas');
  if(flip.img){
    const w = flip.img.naturalWidth, h = flip.img.naturalHeight;
    const scale = Math.min(availW/w, availH/h, 1.5);
    c.width = Math.round(w*scale*dpr); c.height = Math.round(h*scale*dpr);
    c.style.width = Math.round(w*scale)+'px'; c.style.height = Math.round(h*scale)+'px';
    c.getContext('2d').drawImage(flip.img, 0, 0, c.width, c.height);
  } else {
    const page = await flip.doc.getPage(flip.page);
    const base = page.getViewport({scale:1});
    const vp = page.getViewport({scale: Math.min(availW/base.width, availH/base.height)*dpr});
    c.width = vp.width; c.height = vp.height;
    c.style.width = (vp.width/dpr)+'px'; c.style.height = (vp.height/dpr)+'px';
    await page.render({canvasContext:c.getContext('2d'), viewport:vp}).promise;
  }
};
window.closeLightbox = function(){ document.getElementById('lightbox').style.display='none'; };
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeLightbox(); });

/* ---------- puzzle logic ---------- */
window.pickChoice = function(ci){
  if(solvedFlag) return;
  selected = ci;
  document.querySelectorAll('.choice').forEach(c=>c.classList.remove('selected'));
  document.querySelector(`.choice[data-i="${ci}"]`).classList.add('selected');
};
window.checkText = function(){
  if(solvedFlag) return;
  const s = STATIONS[idx];
  const inp = document.getElementById('ans');
  const val = norm(inp.value);
  const fb = document.getElementById('feedback');
  if(!val){ fb.className='feedback no'; fb.textContent='Type something first.'; return; }
  if(s.puzzle.answer.map(norm).includes(val)){
    fb.className='feedback ok'; fb.textContent='Correct — the Department is quietly astonished. The way onward is open.'; solve();
  } else {
    fb.className='feedback no'; fb.textContent='Not quite. Try again, or reveal the answer.';
    inp.classList.remove('shake'); void inp.offsetWidth; inp.classList.add('shake');
  }
};
window.checkChoice = function(){
  if(solvedFlag) return;
  const s = STATIONS[idx];
  const fb = document.getElementById('feedback');
  if(selected<0){ fb.className='feedback no'; fb.textContent='Pick an option first.'; return; }
  const choices = document.querySelectorAll('.choice');
  if(selected === s.puzzle.correct){ choices[selected].classList.add('correct'); fb.className='feedback ok'; fb.textContent='Correct.'; solve(); }
  else { choices[selected].classList.add('wrong'); fb.className='feedback no'; fb.textContent='Not that one. Try again, or reveal the answer.'; }
};
window.showClue = function(){
  const t = document.getElementById('clueText'); if(t) t.style.display='block';
  const b = document.getElementById('clueBtn'); if(b) b.style.display='none';
};
window.revealAnswer = function(){
  const s = STATIONS[idx];
  if(s.puzzle.type==='choice'){
    const choices = document.querySelectorAll('.choice');
    choices.forEach(c=>c.classList.remove('wrong','selected'));
    choices[s.puzzle.correct].classList.add('correct');
  } else {
    document.getElementById('ans').value = s.puzzle.reveal.answer;
  }
  document.getElementById('feedback').textContent='';
  solve();
};
function solve(){
  solvedFlag = true;
  document.getElementById('reveal').classList.add('show');
  const cb = document.getElementById('checkBtn'); if(cb) cb.disabled = true;
  document.querySelectorAll('.choice').forEach(c=>c.classList.add('locked'));
  const outro = document.getElementById('outro'); if(outro) outro.style.display='block';
  const nb = document.getElementById('nextBtn'); if(nb){ nb.disabled=false; nb.classList.add('pulse'); }
}

/* ---------- branching + endings ---------- */
const ENDINGS = {
  sunset: {
    title: "As good as it gets",
    body: ["You go about your day. The sunset is, as promised, worth watching. Somewhere behind you, the Department files itself onward without you.",
           "<em>Mors non finis.</em>"]
  }
};
window.branchGo = function(bi){
  const b = STATIONS[idx].branch[bi];
  if(b.ending) renderEnding(b.ending);
  else go(idx+1);
};
function renderEnding(key){
  const e = ENDINGS[key];
  progressRow.style.display='none';
  app.innerHTML = `
    <div class="card done">
      <img class="stamp" src="Door_Stamp.svg" alt="DoOR seal">
      <h2>${e.title}</h2>
      ${e.body.map(p=>`<p>${p}</p>`).join('')}
      <div class="btn-row" style="justify-content:center">
        <button class="btn btn-ghost" onclick="go(idx)">◂ Go back</button>
        <button class="btn btn-ghost" onclick="go(0)">Walk it again</button>
      </div>
    </div>`;
}

window.go = function(i){
  idx = i;
  if(idx < 0) renderLanding();
  else if(idx >= TOTAL) renderDone();
  else renderStation(idx);
  setProgress();
  window.scrollTo({top:0, behavior:'smooth'});
};
function renderDone(){
  progressFill.style.width='100%';
  app.innerHTML = `
    <div class="card done">
      <img class="stamp" src="Door_Stamp.svg" alt="DoOR seal">
      <h2>Processing complete</h2>
      <p>You have reached the end of the itinerary. The Department will not remember you. You, however, are free to.</p>
      <p><em>Mors non finis.</em></p>
      <div class="btn-row" style="justify-content:center"><button class="btn btn-ghost" onclick="go(0)">Walk it again</button></div>
    </div>`;
}
renderLanding();
